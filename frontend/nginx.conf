user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /var/log/nginx/access.log;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    keepalive_timeout 65;
    types_hash_max_size 2048;

    # важно для POST запросов
    client_max_body_size 10M;

    server {
        listen 80;
        server_name tramplin-career.ru www.tramplin-career.ru;
        return 301 https://$server_name$request_uri;
    }


    server {
        listen 443 ssl http2;

        ssl_certificate     /etc/letsencrypt/live/tramplin-career.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/tramplin-career.ru/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;


        root /usr/share/nginx/html;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # SPA fallback
        location / {
            try_files $uri $uri/ /index.html;
        }

        # общие proxy настройки
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Authorization $http_authorization;
        proxy_set_header Cookie $http_cookie;

        # AUTH SERVICE
        location /api/auth {
            proxy_pass http://auth:9999;
        }

        # PROFILE SERVICE
        location /api/profile {
            proxy_pass http://profile:8080;
        }
        location /api/applicant {
            proxy_pass http://profile:8080;
        }

        # MODERATION SERVICE
        location /api/moderation {
            proxy_pass http://moderation:8082;
        }

        # MEDIA SERVICE
        location /api/media {
            proxy_pass http://media:8091;
        }

        # OPPORTUNITY SERVICE
        location /api/tags {
            proxy_pass http://opportunity:8081;
        }
        location /api/employer/tags {
            proxy_pass http://opportunity:8081;
        }
        location /api/employer/opportunities {
            proxy_pass http://opportunity:8081;
        }

        location /api/opportunities {
            proxy_pass http://opportunity:8081;
        }

        # INTERACTION SERVICE
        location /api/interaction {
            proxy_pass http://interaction:8083;
        }
        location /api/chats {
            proxy_pass http://interaction:8083;
        }

        # PROFILE SERVICE
        location /api/employer {
            proxy_pass http://profile:8080;
        }

        location /ws {
            proxy_pass http://interaction:8083;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # GEO SERVICE
        location /api/geo {
            proxy_pass http://geo:8084;
        }
    }
}
