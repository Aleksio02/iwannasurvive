server:
  port: ${PORT:8082}

spring:
  application:
    name: moderation

  datasource:
    url: ${PROFILE_DB_URL}
    username: ${PROFILE_DB_USERNAME}
    password: ${PROFILE_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: ModerationHikariPool
      maximum-pool-size: 4
      minimum-idle: 1
      idle-timeout: 180000
      max-lifetime: 540000
      keepalive-time: 240000
      connection-timeout: 30000
      validation-timeout: 5000

  jpa:
    properties:
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB

feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000

auth:
  service:
    url: ${AUTH_SERVER_HOST:http://localhost:9999}

profile:
  service:
    url: ${PROFILE_SERVER_HOST:http://localhost:8080}

opportunity:
  service:
    url: ${OPPORTUNITY_SERVER_HOST:http://localhost:8081}

media:
  service:
    url: ${MEDIA_SERVER_HOST:http://localhost:8091}

internal-api:
  api-key: ${INTERNAL_API_KEY}

app:
  ai:
    moderation:
      enabled: ${AI_MODERATION_ENABLED:false}
      prompt-version: ai-moderation-v1
      max-input-chars: 12000
      max-reasons: 6
      max-highlighted-fields: 8
      async-timeout-ms: 10000
      supported:
        opportunity-review: true
        applicant-profile-review: true
        employer-profile-review: true
        employer-verification-review: true
        tag-review: true
    yandex-gpt:
      endpoint: ${YANDEX_AI_ENDPOINT:https://llm.api.cloud.yandex.net/foundationModels/v1/completion}
      folder-id: ${YANDEX_AI_FOLDER_ID:}
      api-key: ${YANDEX_AI_API_KEY:}
      api-key-id: ${YANDEX_AI_API_KEY_ID:}
      model-uri: ${YANDEX_AI_MODEL_URI:}
      temperature: 0.2
      max-tokens: 2000

springdoc:
  paths-to-match: /api/**
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    disable-swagger-default-url: true
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
    try-it-out-enabled: true
    filter: true
