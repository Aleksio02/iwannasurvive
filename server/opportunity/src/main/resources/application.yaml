server:
  port: ${PORT:8081}

spring:
  application:
    name: opportunity

  datasource:
    url: ${PROFILE_DB_URL}
    username: ${PROFILE_DB_USERNAME}
    password: ${PROFILE_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: OpportunityHikariPool
      maximum-pool-size: 8
      minimum-idle: 2
      idle-timeout: 300000
      max-lifetime: 540000
      keepalive-time: 240000
      connection-timeout: 30000
      validation-timeout: 5000

  jpa:
    properties:
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect

feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000

auth:
  service:
    url: ${AUTH_SERVER_HOST:http://localhost:9999}

moderation:
  service:
    url: ${MODERATION_SERVER_HOST:http://localhost:8082}

media:
  service:
    url: ${MEDIA_SERVER_HOST:http://localhost:8091}

profile:
  service:
    url: ${PROFILE_SERVER_HOST:http://localhost:8080}

interaction:
  service:
    url: ${INTERACTION_SERVER_HOST:http://localhost:8083}

internal-api:
  api-key: ${INTERNAL_API_KEY}

app:
  ai:
    tag-suggestions:
      enabled: ${AI_TAG_SUGGESTIONS_ENABLED:false}
      prompt-version: ai-tag-suggestions-v1
      max-input-chars: 6000
      max-candidate-tags: 300
      max-suggestions: 7
      timeout-ms: 10000
    description-generation:
      enabled: ${AI_DESCRIPTION_GENERATION_ENABLED:false}
      prompt-version: ai-opportunity-description-v1
      max-input-chars: 6000
      max-notes-chars: 2000
      max-short-description-chars: 1000
      max-full-description-chars: 4000
      max-requirements-chars: 2000
    recommendation-explanations:
      enabled: ${AI_RECOMMENDATION_EXPLANATIONS_ENABLED:false}
      prompt-version: ai-recommendation-explanations-v1
      max-candidates: 120
      max-recommendations: 6
      min-score: ${AI_RECOMMENDATION_MIN_SCORE:55}
      min-skill-matches: ${AI_RECOMMENDATION_MIN_SKILL_MATCHES:1}
      min-skill-coverage: ${AI_RECOMMENDATION_MIN_SKILL_COVERAGE:0.30}
      strong-skill-matches: ${AI_RECOMMENDATION_STRONG_SKILL_MATCHES:2}
      strong-skill-coverage: ${AI_RECOMMENDATION_STRONG_SKILL_COVERAGE:0.60}
      min-partial-skill-coverage: ${AI_RECOMMENDATION_MIN_PARTIAL_SKILL_COVERAGE:0.30}
      max-partial-skill-tags: ${AI_RECOMMENDATION_MAX_PARTIAL_SKILL_TAGS:3}
      max-reasons: 3
      max-improvement-tips: 3
    yandex-gpt:
      endpoint: ${YANDEX_AI_ENDPOINT:https://llm.api.cloud.yandex.net/foundationModels/v1/completion}
      folder-id: ${YANDEX_AI_FOLDER_ID:}
      api-key: ${YANDEX_AI_API_KEY:}
      api-key-id: ${YANDEX_AI_API_KEY_ID:}
      model-uri: ${YANDEX_AI_MODEL_URI:}
      temperature: 0.1
      max-tokens: 1200

springdoc:
  paths-to-match: /api/**
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    disable-swagger-default-url: true
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
    try-it-out-enabled: true
    filter: true
